apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: platform-data
  namespace: tmod-smart-employee
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 50Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: tmod-smart-employee
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/your-org/tmod-smart-employee-api:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: tmod-smart-employee-config
            - secretRef:
                name: tmod-smart-employee-secret
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tmod-smart-employee
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/tmod-smart-employee-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: tmod-smart-employee-config
            - secretRef:
                name: tmod-smart-employee-secret
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: platform-data
              mountPath: /app/data
      volumes:
        - name: platform-data
          persistentVolumeClaim:
            claimName: platform-data
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: tmod-smart-employee
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: tmod-smart-employee
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/tmod-smart-employee-api:latest
          command: ["celery", "-A", "app.worker.celery_app.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: tmod-smart-employee-config
            - secretRef:
                name: tmod-smart-employee-secret
          volumeMounts:
            - name: platform-data
              mountPath: /app/data
      volumes:
        - name: platform-data
          persistentVolumeClaim:
            claimName: platform-data
