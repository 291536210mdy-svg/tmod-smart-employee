apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: tmod-smart-employee
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/tmod-smart-employee-web:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: tmod-smart-employee
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
