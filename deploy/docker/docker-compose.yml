services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: review_platform
      POSTGRES_USER: review_platform
      POSTGRES_PASSWORD: change-me
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U review_platform -d review_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    env_file:
      - ../../review_platform/server/.env.example.server
    environment:
      APP_DATA_DIR: /app/data
      DATABASE_URL: postgresql+psycopg://review_platform:change-me@db:5432/review_platform
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      RUN_EXECUTION_BACKEND: celery
    volumes:
      - api-data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    command: ["celery", "-A", "app.worker.celery_app.celery_app", "worker", "--loglevel=INFO", "--concurrency=2"]
    env_file:
      - ../../review_platform/server/.env.example.server
    environment:
      APP_DATA_DIR: /app/data
      DATABASE_URL: postgresql+psycopg://review_platform:change-me@db:5432/review_platform
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      RUN_EXECUTION_BACKEND: celery
    volumes:
      - api-data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  api-data:
  postgres-data:
  redis-data:
